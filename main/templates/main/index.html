{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Squares Interior Design</title>
    <link rel="stylesheet" href="{% static 'main/shared.css' %}">
    <style>
        body { background: var(--bg-color); }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .splash-logo { display: flex; flex-direction: column; align-items: center; gap: 20px; opacity: 0; transform: scale(0.8); animation: splashReveal 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
        @keyframes splashReveal { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
        .splash-logo-title { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 2.5rem; color: #0a2c1c; letter-spacing: 5px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="splash-screen">
        <div class="splash-logo">
            <img src="{% static 'main/images/logo.png' %}" alt="3Squares Logo" class="splash-logo-img">
        </div>
    </div>
    <script>
        // Show splash, then redirect to About page
        setTimeout(() => {
            window.location.href = "{% url 'about' %}";
        }, 2200);
    </script>
</body>
</html>
