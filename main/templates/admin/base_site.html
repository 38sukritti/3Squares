{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | 3Squares Admin Dashboard{% endblock %}

{% block extrastyle %}
<link rel="stylesheet" href="{% static 'main/css/admin_custom.css' %}">
{% endblock %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
        <svg width="24" height="24" viewBox="0 0 120 120" style="margin-right: 5px;">
            <rect x="10" y="10" width="100" height="100" fill="none" stroke="white" stroke-width="12"/>
            <rect x="35" y="35" width="50" height="50" fill="none" stroke="white" stroke-width="12"/>
            <rect x="60" y="60" width="1" height="1" fill="none" stroke="white" stroke-width="16"/>
        </svg>
        <span style="font-weight: 900; letter-spacing: 1.5px; color: white;">3SQUARES ADMIN</span>
    </a>
</div>
{% endblock %}

{% block nav-global %}{% endblock %}
